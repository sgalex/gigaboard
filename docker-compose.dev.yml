# Разработка: объединяется с базовым compose (postgres, redis, сеть, тома).
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Backend: bind-mount ./apps/backend/app, uvicorn --reload.
# Frontend: Vite :5173, VITE_DEV_PROXY_TARGET → backend:8000 (см. apps/web/vite.config.ts).
# Инструменты (pgadmin, redis-commander): профиль tools — см. compose profiles.

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
    volumes:
      - ./apps/backend/app:/app/app
    environment:
      GIGABOARD_IN_DOCKER: "1"
      DEBUG: "true"
      ENVIRONMENT: development
      SKIP_ALEMBIC_UPGRADE: ${SKIP_ALEMBIC_UPGRADE:-0}
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--proxy-headers", "--forwarded-allow-ips=*" ]

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    volumes:
      - ./apps/web/src:/workspace/apps/web/src
      - ./apps/web/public:/workspace/apps/web/public
      - ./apps/web/vite.config.ts:/workspace/apps/web/vite.config.ts
      - ./apps/web/index.html:/workspace/apps/web/index.html
    environment:
      NODE_ENV: development
      VITE_DEV_PROXY_TARGET: http://backend:8000
    command: [ "npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173" ]
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gigaboard-pgadmin
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gigaboard.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - gigaboard-network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: gigaboard-redis-commander
    profiles:
      - tools
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      - redis
    networks:
      - gigaboard-network
    restart: unless-stopped
