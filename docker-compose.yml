services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gigaboard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gigaboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigaboard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gigaboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gigaboard}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gigaboard-network
    restart: unless-stopped

  # Redis for caching and Message Bus
  redis:
    image: redis:7-alpine
    container_name: gigaboard-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gigaboard-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: gigaboard-backend
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gigaboard}:${POSTGRES_PASSWORD:-gigaboard_secret}@postgres:5432/${POSTGRES_DB:-gigaboard}

      # Redis
      REDIS_URL: redis://redis:6379/0
      MESSAGE_BUS_REDIS_URL: redis://redis:6379/1

      # JWT
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}

      # GigaChat API
      GIGACHAT_API_KEY: ${GIGACHAT_API_KEY}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}

      # Application
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}

      # Uploads
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-104857600}

    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gigaboard-network
    restart: unless-stopped

  # Frontend (Nginx + React)
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: gigaboard-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - gigaboard-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  gigaboard-network:
    driver: bridge
