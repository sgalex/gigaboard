# Полный стек (production): UI на FRONTEND_PORT → nginx в образе frontend → /api и /socket.io → backend.
#
# Обновление образов после git pull:
#   docker compose build
#   docker compose up -d
# Обновить базовые образы (postgres/redis/node): docker compose build --pull
# При подозрении на кэш слоёв: docker compose build --no-cache
#
# ВАЖНО — стриминг NDJSON (мультиагент, прогресс в UI):
# - В образе frontend apps/web/nginx.conf уже: proxy_buffering off для /api/.
# - Если перед Docker стоит ещё nginx на хосте/ВМ — там тоже нужен proxy_buffering off на прокси к FRONTEND_PORT,
#   иначе ответ буферизуется целиком. См. res/nginx-vm-gigaboard.conf и docs/DOCKER_VM_DEPLOYMENT.md.
#
# VITE_API_URL: оставьте пустым в .env для одного origin (HTTPS); не задавайте http:// при HTTPS-странице.
#
services:
  postgres:
    image: postgres:16-alpine
    container_name: gigaboard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gigaboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigaboard_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gigaboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Порты не публикуем: доступ только из сети Compose. Наружу — см. FRONTEND_PORT (nginx).
    # Отладка: docker compose -f docker-compose.yml -f docker-compose.publish-internal-ports.yml up -d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gigaboard}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gigaboard-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gigaboard-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gigaboard-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
      args:
        # Если из Docker VM недоступен pypi.org — задайте в .env, например:
        # PYPI_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://pypi.org/simple}
    container_name: gigaboard-backend
    environment:
      # Явно: backend в Compose не должен брать DATABASE_URL из смонтированного .env с localhost
      GIGABOARD_IN_DOCKER: "1"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gigaboard}:${POSTGRES_PASSWORD:-gigaboard_secret}@postgres:5432/${POSTGRES_DB:-gigaboard}

      REDIS_URL: redis://redis:6379/0

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}

      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:80,http://127.0.0.1:80,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}

      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      # Корневой .env подставляется Compose’ом в ${...}: если там STORAGE_BACKEND=local для хоста,
      # без пути файлы попадут в /app/data/uploads, а не в том uploads_data:/app/uploads — см. docs/DOCKER_VM_DEPLOYMENT.md
      STORAGE_BACKEND: ${STORAGE_BACKEND:-database}
      STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-/app/uploads}
      STORAGE_MAX_FILE_SIZE_MB: ${STORAGE_MAX_FILE_SIZE_MB:-100}

      # 1 — не выполнять alembic при старте (только для отладки образа)
      SKIP_ALEMBIC_UPGRADE: ${SKIP_ALEMBIC_UPGRADE:-0}

    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gigaboard-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Пусто = бандл с window.location.origin / относительные /api (см. apps/web/src/config/apiBase.ts)
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: gigaboard-frontend
    ports:
      # 3000 по умолчанию — без привилегий на Windows (в отличие от :80)
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gigaboard-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  gigaboard-network:
    driver: bridge
