# Nginx на виртуальной машине: слушает порт 80 и проксирует весь трафик на Docker-фронт
# на 127.0.0.1:3000 (FRONTEND_PORT в .env / docker-compose).
#
# Это обратный прокси (reverse proxy): в браузере остаётся http://ваш-хост/ без :3000.
# Если нужен именно HTTP-редирект 302 на :3000 — так делать не рекомендуется (меняется URL).
#
# Use with Docker Compose stack where frontend is published on FRONTEND_PORT (default 3000).
#
# Install (Ubuntu/Debian), из корня репозитория на ВМ:
#   sudo cp res/nginx-vm-gigaboard.conf /etc/nginx/sites-available/gigaboard.conf
#   sudo ln -s /etc/nginx/sites-available/gigaboard.conf /etc/nginx/sites-enabled/gigaboard.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT:
# - Replace example.com with your real domain or VM IP.
# - If FRONTEND_PORT in .env is not 3000, update upstream port below.
#
# TLS и цепочка прокси:
# - Браузер → HTTPS → этот nginx: здесь $scheme = https — передавайте X-Forwarded-Proto $scheme
#   на Docker (:3000). Контейнерный nginx GigaBoard пробрасывает это к FastAPI (см. apps/web/nginx-forwarded-map.conf).
# - Если смешанный контент (HTTPS страница, запросы на http://) — пересоберите frontend без VITE_API_URL=http,
#   и в каждом server { listen 443 ssl } добавьте в location /:
#     add_header Content-Security-Policy "upgrade-insecure-requests" always;
#
# Стриминг NDJSON (мультиагент, прогресс в TransformDialog и др.):
# - По умолчанию nginx **буферизует** ответ апстрима — клиент получает весь поток одним куском в конце,
#   прогресс в UI не двигается. Обязательно proxy_buffering off (и ниже) в location, который проксирует на фронт.

upstream gigaboard_frontend {
    # Порт, на который проброшен контейнер gigaboard-frontend (см. FRONTEND_PORT)
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    # Внешний вход пользователей — только 80; дальше nginx отдаёт запросы на :3000
    listen 80;
    listen [::]:80;
    server_name example.com _;

    client_max_body_size 100m;

    location / {
        proxy_pass http://gigaboard_frontend;
        proxy_http_version 1.1;

        # Preserve original host/proto for backend redirects behind internal nginx.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        # Upgrade headers (websocket / socket.io).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # NDJSON / AI long responses — иначе прогресс «застывает», пока ответ не полностью сформирован
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

# После Certbot для listen 443 ssl внутри location / рекомендуется:
#   add_header Content-Security-Policy "upgrade-insecure-requests" always;
# (подстраховка: браузер обновит подресурсы с http на https для этого origin).

