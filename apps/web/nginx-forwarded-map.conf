# Подключается до default.conf. За внешним TLS-прокси (VM nginx → :3000) соединение к контейнеру HTTP,
# поэтому $scheme там «http». Пробрасываем X-Forwarded-Proto с внешнего прокси к backend; иначе uvicorn
# считает запрос HTTP и может отдавать Location / OpenAPI с http:// — и смешанный контент в браузере.
map $http_x_forwarded_proto $gigaboard_forwarded_proto {
    ''      $scheme;
    default $http_x_forwarded_proto;
}
